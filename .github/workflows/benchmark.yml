name: Compression Benchmark

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - package.json
      - package-lock.json
      - scripts/benchmark.js
      - .github/workflows/benchmark.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0
      - name: Restore npm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci --prefer-offline
      - name: Run compression benchmark
        run: npm run benchmark
      - name: Commit benchmark artifacts
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md charts
          if git diff --cached --quiet; then
            echo "No benchmark updates to commit."
            exit 0
          fi

          git commit -m "chore: update benchmark artifacts"
          git push origin HEAD:"${BRANCH_NAME}"
      - name: Report pending artifact updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --stat README.md charts || true
          if ! git diff --quiet README.md charts; then
            echo "::warning::Benchmark artifacts differ from committed versions. Run 'npm run benchmark' locally and commit the updated README.md and charts."
          fi
